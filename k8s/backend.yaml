apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: eranbar9/docker-playground:backend
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URL
#         value: "mongodb://mongo-service:27017"
          valueFrom:
            configMapKeyRef:
              name: backend-cm
              key: MONGO_URL
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000