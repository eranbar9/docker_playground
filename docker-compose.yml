services: 
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT}:80"

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
 #    MONGO_URL: "mongodb://mongo:27017"
      MONGO_URL: ${MONGO_URL}
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
#     - mongo
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:latest
    volumes:
      - local:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo-express:
    image: mongo-express:latest
    environment:
#     ME_CONFIG_MONGODB_SERVER: "mongo"
      ME_CONFIG_MONGODB_SERVER: ${ME_CONFIG_MONGODB_SERVER}
    secrets:
      - mongo_express_username
      - mongo_express_password
    ports:
      - "${MONGO_EXPRESS_PORT}:8081"
    depends_on:
#     - mongo
      mongo:
        condition: service_healthy

volumes:
  local:

secrets:
  mongo_express_username:
    environment: MONGO_EXPRESS_USERNAME
  mongo_express_password:
    environment: MONGO_EXPRESS_PASSWORD